<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      (() => {
        const root = document.documentElement;
        const hadDarkInitially = root.classList.contains("dark");
        const initialColorScheme = root.style.colorScheme;
        const markerAttr = "data-landing-dark-applied";

        function applyLandingTheme() {
          const isHomePage = window.location.pathname === "/";

          if (isHomePage) {
            root.classList.add("dark");
            root.style.colorScheme = "dark";
            root.setAttribute(markerAttr, "true");
            return;
          }

          if (root.getAttribute(markerAttr) === "true") {
            if (!hadDarkInitially) {
              root.classList.remove("dark");
            }
            root.style.colorScheme = initialColorScheme;
            root.removeAttribute(markerAttr);
          }
        }

        applyLandingTheme();

        const pushState = history.pushState;
        history.pushState = function (...args) {
          const result = pushState.apply(this, args);
          applyLandingTheme();
          return result;
        };

        const replaceState = history.replaceState;
        history.replaceState = function (...args) {
          const result = replaceState.apply(this, args);
          applyLandingTheme();
          return result;
        };

        window.addEventListener("popstate", applyLandingTheme);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
